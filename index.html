<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Layout</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body id="background">
    <div class="content">
      <div class="sci-layout">
        <!-- Top row: 3 equal cards -->
        <div class="sci-top">
          <!-- Left: Clock -->
          <div id="clock-card">
            <!-- Clock Face -->
            <div class="clock-face">
              <time class="clock-time" id="clock-time">00:00</time>
              <div class="pomo-display">
                <span class="pomo-dot" id="pomo-dot"></span>
                <span class="pomo-countdown" id="pomo-countdown">25:00</span>
                <span class="pomo-phase" id="pomo-phase">Work</span>
              </div>
              <div class="next-event" id="next-event" hidden>
                <span class="next-event-title" id="next-event-title"></span>
                <span class="next-event-eta" id="next-event-eta"></span>
              </div>
              <div
                class="next-event-bar-wrap bg-card"
                id="next-event-bar-wrap"
                hidden
              >
                <div class="next-event-bar-fill" id="next-event-bar-fill"></div>
              </div>
            </div>
            <div class="clock-pills">
              <!-- Day Pill Stat -->
              <div class="pill-track">
                <div class="pill-fill" id="clock-day-fill"></div>
                <span class="pill-pct" id="clock-day-pct"></span>
                <i class="pill-emoji bi bi-sun"></i>
              </div>
            </div>
          </div>

          <!-- Center: split in 2 -->
          <div class="sci-top-mid">
            <div class="sci-card card-bg">
              <h2 class="panel-title">
                Tasks <span class="panel-status" id="tasks-date"></span>
              </h2>
              <div class="tasks-content" id="tasks-content">
                <p class="loading-msg">Loading...</p>
              </div>
            </div>

            <div class="sci-card card-bg">
              <h2 class="panel-title">
                Finances <span class="panel-status" id="finance-month"></span>
              </h2>
              <div id="finance-summary"></div>
              <div id="finance-categories"></div>
              <div id="finance-transactions"></div>
            </div>
          </div>

          <!-- Right -->
          <div class="sci-card" id="weeks-card">
            <div class="weeks-left card-bg"></div>
            <div class="weeks-right">
              <div id="weeks-grid"></div>
            </div>
          </div>
        </div>

        <!-- Bottom row -->
        <div class="sci-bottom">
          <div class="sci-card card-bg" id="btc-panel">
            <span class="btc-label">BTC / USD</span>
            <span class="btc-price" id="btc-price">—</span>
            <span class="btc-updated" id="btc-updated"></span>
          </div>
          <div class="sci-card card-bg" id="calendar-panel">
            <h2 class="panel-title">
              Calendar <span class="panel-status" id="cal-status"></span>
            </h2>
            <div class="cal-content" id="cal-content">
              <p class="loading-msg">Loading...</p>
            </div>
          </div>
          <div class="sci-stats-col">
            <div class="sci-streaks" id="streaks-panel"></div>
            <div class="sci-stats-bars" id="stats-bars">
              <div class="stat-pill" data-field="exercise">
                <div class="pill-track">
                  <div class="pill-fill" style="--c: var(--accent)"></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-activity"></i>
                </div>
                <!-- <span class="stat-pill-label">exercise</span> -->
              </div>
              <div class="stat-pill" data-field="energy">
                <div class="pill-track">
                  <div class="pill-fill" style="--c: #c4a45a"></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-lightning-charge"></i>
                </div>
                <!-- <span class="stat-pill-label">energy</span> -->
              </div>
              <div class="stat-pill" data-field="mood">
                <div class="pill-track">
                  <div class="pill-fill" style="--c: var(--blue-night)"></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-emoji-smile"></i>
                </div>
                <!-- <span class="stat-pill-label">mood</span> -->
              </div>
              <div class="stat-pill" data-field="stress">
                <div class="pill-track">
                  <div class="pill-fill" style="--c: var(--danger)"></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-fire"></i>
                </div>
                <!-- <span class="stat-pill-label">stress</span> -->
              </div>
              <div class="stat-pill" data-field="focus">
                <div class="pill-track">
                  <div
                    class="pill-fill"
                    style="--c: rgba(245, 239, 213, 0.08)"
                  ></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-crosshair"></i>
                </div>
                <!-- <span class="stat-pill-label">focus</span> -->
              </div>
              <div class="stat-pill" data-field="sleep_score">
                <div class="pill-track">
                  <div class="pill-fill" style="--c: #7b9dd4"></div>
                  <span class="pill-pct"></span>
                  <i class="pill-emoji bi bi-moon-stars"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
