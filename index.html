<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="background">
    <div class="content">

        <div class="dashboard-container">
            <!-- Panel de tareas (izquierda) -->
            <div class="panel tasks-panel">
                <h2 class="panel-title">Tareas <span class="panel-status" id="tasks-date"></span></h2>
                <div class="tasks-content" id="tasks-content">
                    <p class="loading-msg">Cargando...</p>
                </div>
            </div>

            <!-- Panel de tracker (centro) -->
            <div class="panel tracker-panel">
                <h2 class="panel-title">Tracker</h2>
                <div class="tracker-content">
                </div>
            </div>

            <!-- Panel de finanzas (derecha) -->
            <div class="panel finance-panel">
                <h2 class="panel-title">Finanzas <span class="panel-status" id="finance-month"></span></h2>
                <div id="finance-summary"></div>
                <div id="finance-categories"></div>
                <div id="finance-transactions"></div>
            </div>
        </div>


    </div>

    <script src="script.js"></script>

</body>

</html>
